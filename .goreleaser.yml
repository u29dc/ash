version: 2

project_name: ash

before:
  hooks:
    - go mod tidy

builds:
  - id: ash
    main: ./cmd/ash
    binary: ash
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: ash
    repository:
      owner: u29dc
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/u29dc/ash"
    description: "Fast, safe macOS cleanup utility"
    license: "MIT"
    install: |
      bin.install "ash"
    test: |
      system "#{bin}/ash", "--version"

release:
  github:
    owner: u29dc
    name: ash
  draft: true
  prerelease: auto
  name_template: "v{{.Version}}"
