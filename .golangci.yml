run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Defaults
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Strict additions - matching TypeScript strictness
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - goconst
    - gocritic
    - gofumpt
    - gosec
    - makezero
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - tenv
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - io.Copy
      - io.WriteString

  govet:
    enable-all: true
    disable:
      - fieldalignment # Can cause issues with struct ordering

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated

  gosec:
    excludes:
      - G104 # Unhandled errors (we use errcheck)
      - G304 # File path from variable (intentional for this tool)

  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: var-declaration
      - name: var-naming

  exhaustive:
    default-signifies-exhaustive: true

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  stylecheck:
    checks:
      - all
      - -ST1000 # Package comments not required

  staticcheck:
    checks:
      - all

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - errcheck
        - forcetypeassert

    - path: cmd/
      linters:
        - gochecknoglobals

    # Allow using fmt.Sprintf for error messages
    - linters:
        - goerr113
      text: "do not define dynamic errors"

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error
  rules:
    - linters:
        - gocritic
      severity: warning
