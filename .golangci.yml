version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - cyclop
    - dupl
    - durationcheck
    - errorlint
    - exhaustive
    - funlen
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  disable:
    - nilerr  # Many intentional nil returns in filepath.Walk callbacks
    - prealloc  # Micro-optimization, not worth the noise

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable:
        - shadow

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam  # Bubble Tea API requires value receivers
        - appendCombine  # Explicit is clearer
        - filepathJoin  # Intentional test case

    gosec:
      excludes:
        - G104  # Unhandled errors - too noisy, covered by errcheck
        - G301  # Directory permissions
        - G302  # File permissions in test utilities
        - G306  # Poor file permissions
        - G115  # Integer overflow conversion

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: var-declaration
        - name: var-naming

    exhaustive:
      default-signifies-exhaustive: true

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

    cyclop:
      max-complexity: 10

    funlen:
      lines: 60
      statements: 40

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - errcheck
          - funlen
          - dupl
      - text: "Error return value of .* is not checked"
        linters:
          - errcheck
        source: "_ ="
      - text: "Error return value is not checked"
        source: "\\.(Model)"
        linters:
          - errcheck
      # Bubble Tea Update functions naturally have high complexity due to message handling
      - path: internal/app/app\.go
        text: "calculated cyclomatic complexity for function (Update|handleConfirm)"
        linters:
          - cyclop
      - path: internal/app/app\.go
        text: "Function 'Update'"
        linters:
          - funlen
      # Scanner and cleaner modules have inherent complexity from filesystem operations
      - path: internal/scanner/
        text: "calculated cyclomatic complexity"
        linters:
          - cyclop
      - path: internal/scanner/
        linters:
          - funlen
      - path: internal/cleaner/
        text: "calculated cyclomatic complexity"
        linters:
          - cyclop
      - path: internal/cleaner/
        linters:
          - funlen
      # Module scan functions share similar patterns by design
      - path: internal/cleaner/modules/
        linters:
          - dupl
          - funlen
      # TUI styles are declarative and naturally long
      - path: internal/tui/styles\.go
        linters:
          - funlen
      # G204: Subprocess with variable - controlled internal commands
      - path: internal/cleaner/trash\.go
        text: "G204"
        linters:
          - gosec
      - path: internal/maintenance/commands\.go
        text: "G204"
        linters:
          - gosec
      # G304: File inclusion via variable - paths are validated/controlled
      - path: pkg/plist/plist\.go
        text: "G304"
        linters:
          - gosec
      - path: internal/config/config\.go
        text: "G304"
        linters:
          - gosec
      - path: internal/scanner/orphan\.go
        text: "G304"
        linters:
          - gosec
      - path: internal/cleaner/modules/apps\.go
        text: "G304"
        linters:
          - gosec
      # Test utilities
      - path: internal/testutil/
        linters:
          - gosec

output:
  formats:
    text:
      path: stdout
