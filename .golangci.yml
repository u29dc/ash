version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - durationcheck
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  disable:
    - nilerr  # Many intentional nil returns in filepath.Walk callbacks
    - prealloc  # Micro-optimization, not worth the noise

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable:
        - shadow

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam  # Bubble Tea API requires value receivers
        - octalLiteral  # Old style is more readable
        - paramTypeCombine  # Explicit is clearer
        - unnamedResult  # Named results can be confusing
        - appendCombine  # Explicit is clearer
        - emptyStringTest  # Both styles are valid
        - filepathJoin  # Intentional test case

    gosec:
      excludes:
        - G104
        - G204
        - G301
        - G302  # File permissions in test utilities
        - G304
        - G306
        - G115

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: var-declaration
        - name: var-naming

    exhaustive:
      default-signifies-exhaustive: true

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    nakedret:
      max-func-lines: 30

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - errcheck
      - text: "Error return value of .* is not checked"
        linters:
          - errcheck
        source: "_ ="
      - text: "Error return value is not checked"
        source: "\\.(Model)"
        linters:
          - errcheck

output:
  formats:
    text:
      path: stdout
